<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Bengkel Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Laporan Harian Bengkel</h1>
            <p id="date-display"></p>
        </header>

        <!-- FORM INPUT -->
        <section class="card input-section">
            <h3>Input Data Servis</h3>
            <form id="input-form">
                <div class="form-group">
                    <input type="text" id="nama-barang" placeholder="Nama Barang / Jasa Servis" required>
                </div>
                <div class="form-group row">
                    <input type="number" id="qty" placeholder="Jumlah (Qty)" required>
                    <input type="number" id="harga" placeholder="Total Harga (Rp)" required>
                </div>
                <button type="submit" id="btn-simpan">Simpan ke Cloud</button>
            </form>
        </section>

        <!-- STATISTIK -->
        <div class="stats-grid">
            <div class="card stat">
                <small>TOTAL SERVIS</small>
                <h2 id="jumlah-servis">0</h2>
            </div>
            <div class="card stat">
                <small>TOTAL PENDAPATAN</small>
                <h2 id="total-biaya">Rp 0</h2>
            </div>
        </div>

        <!-- TABEL DATA -->
        <section class="card table-section">
            <div class="header-table">
                <h3>Riwayat Hari Ini</h3>
                <div id="loading" class="spinner">Memuat data...</div>
            </div>
            <div class="table-wrapper">
                <table id="parts-table">
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>Item/Jasa</th>
                            <th>Qty</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
